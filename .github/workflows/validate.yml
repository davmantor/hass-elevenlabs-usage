name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-validation:
    name: Python Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort
      - name: Check Python syntax
        run: python -m py_compile custom_components/hass_elevenlabs_usage/*.py
      - name: Run ruff (linter)
        run: ruff check custom_components/hass_elevenlabs_usage/
      - name: Check code formatting with black
        run: |
          black --check custom_components/hass_elevenlabs_usage/ || (
            echo "❌ Code formatting check failed. Run: black custom_components/hass_elevenlabs_usage/"
            exit 1
          )
      - name: Check import sorting with isort
        run: isort --check-only custom_components/hass_elevenlabs_usage/

  markdown-link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/mlc_config.json'

  manifest-validation:
    name: Validate Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.json
        run: |
          python -m json.tool custom_components/hass_elevenlabs_usage/manifest.json > /dev/null
          echo "manifest.json is valid JSON"
